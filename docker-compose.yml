services:
  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/live').read()"]
      interval: 15s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"

  worker:
    build: .
    env_file:
      - .env
    restart: unless-stopped
    command: rq worker ${APP_INGEST_QUEUE_NAME:-ingest} --url ${APP_REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"

  web:
    build:
      context: ./web
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: complyra
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d complyra"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  qdrant:
    image: qdrant/qdrant:v1.12.6
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  prometheus:
    image: prom/prometheus:v2.53.3
    restart: unless-stopped
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./ops/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
